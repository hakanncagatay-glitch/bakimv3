<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BakımPro CMMS | Makineler</title>

    <link rel="stylesheet" href="makineler.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-screwdriver-wrench"></i>

            <span>BakımPro</span>

        </div>

        <nav>

            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </a>

            <a href="makineler.html" class="active">
                <i class="fa-solid fa-industry"></i>
                Makineler
            </a>

            <a href="#">
                <i class="fa-solid fa-screwdriver"></i>
                Bakımlar
            </a>

            <a href="#">
                <i class="fa-solid fa-barcode"></i>
                QR Kod
            </a>

            <a href="#">
                <i class="fa-solid fa-chart-column"></i>
                Raporlar
            </a>

            <a href="#">
                <i class="fa-solid fa-gear"></i>
                Ayarlar
            </a>

        </nav>

    </aside>


    <!-- İçerik -->

    <main class="content">

        <div class="pageHeader">

            <div>

                <h1>Makineler</h1>

                <p>
                    Tüm makineleri görüntüleyin ve yönetin.
                </p>

            </div>

            <button class="btnPrimary">

                <i class="fa-solid fa-plus"></i>

                Yeni Makine

            </button>

        </div>


        <div class="toolbar">

            <div class="searchBox">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    id="arama"
                    type="text"
                    placeholder="Envanter, marka veya model ara...">

            </div>

            <select id="filtreBolum">

                <option>Tüm Bölümler</option>

            </select>

            <select id="filtreDurum">

                <option>Tüm Durumlar</option>

            </select>

        </div>


        <div id="makineListe" class="makineGrid">

            <!-- Kartlar JS ile gelecek -->

        </div>

    </main>

</div>

<script src="makineler.js"></script>

</body>

</html>
