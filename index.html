<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bakım Pro V3</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="header">

            <h1>🔧 Bakım Yönetim Sistemi</h1>

            <p>Makine bakım kayıt sistemi</p>

        </div>

        <!-- Makine Ara -->

        <div class="card">

            <h2>Makine Ara</h2>

            <input
                id="envanter"
                type="text"
                placeholder="Envanter Kodu">

            <input
                id="sase"
                type="text"
                placeholder="Şase No">

            <button id="btnAra">

                Makineyi Bul

            </button>

        </div>

        <!-- Makine Bilgileri -->

        <div
            id="makineKart"
            class="card"
            style="display:none">

            <h2>Makine Bilgileri</h2>

            <table>

                <tr>
                    <td>Envanter</td>
                    <td id="lblEnvanter"></td>
                </tr>

                <tr>
                    <td>Marka</td>
                    <td id="lblMarka"></td>
                </tr>

                <tr>
                    <td>Model</td>
                    <td id="lblModel"></td>
                </tr>

                <tr>
                    <td>Konum</td>
                    <td id="lblKonum"></td>
                </tr>

                <tr>
                    <td>Periyot</td>
                    <td id="lblPeriyot"></td>
                </tr>

                <tr>
                    <td>Son Bakım</td>
                    <td id="lblSonBakim"></td>
                </tr>

                <tr>
                    <td>Sonraki Bakım</td>
                    <td id="lblSonrakiBakim"></td>
                </tr>

            </table>

        </div>

        <!-- BAKIM KAYDI -->

        <div
            id="bakimKart"
            class="card"
            style="display:none">

            <h2>🛠 Bakım Kaydı</h2>

            <label>Bakım Türü</label>

            <select id="bakimTuru">

                <option value="Genel Bakım">Genel Bakım</option>
                <option value="Periyodik Bakım">Periyodik Bakım</option>
                <option value="Arıza">Arıza</option>
                <option value="Kontrol">Kontrol</option>

            </select>

            <label>Bakımı Yapan</label>

            <input
                id="bakimiYapan"
                type="text"
                placeholder="Ad Soyad">

            <label>Arıza Nedeni</label>

            <input
                id="arizaNedeni"
                type="text"
                placeholder="Boş bırakılabilir">

            <label>Değişen Parçalar</label>

            <textarea
                id="degisenParcalar"
                rows="3"
                placeholder="Kayış, Rulman, Motor..."></textarea>

            <label>Açıklama</label>

            <textarea
                id="aciklama"
                rows="5"
                placeholder="Bakım açıklaması..."></textarea>

            <button id="btnKaydet">

                💾 Bakımı Kaydet

            </button>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
